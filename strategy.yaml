dry_run: true
min_edge: 0.05
min_prob: 0.87
min_bet: 1.00
max_bet: 50.00
bankroll: 100.00
kelly_fraction_cap: 0.05
auto_update_enabled: false

# Safety: must be true in .env to allow live trading
live_trading_ack: false

# Proxy wallet / Gnosis Safe support
# Set SAFE_ADDRESS in .env for proxy wallet, or set signature_type here
# 1 = EOA (default), 2 = POLY_PROXY, 3 = POLY_GNOSIS_SAFE
signature_type: 1

# Future phases (scaffolded, not yet implemented)
markov_window: 20
journal_path: "logs/trade_journal"

# Telegram (secrets go in .env, not here)
# telegram_bot_token and telegram_chat_id are read from .env
telegram_enabled: true
telegram_trade_alerts: false
telegram_daily_summary: true

# Nightly review
nightly_review_enabled: true
nightly_review_time: "00:00"

# Strategy auto-update safety bounds
min_prob_min: 0.82
min_prob_max: 0.95
min_prob_daily_step: 0.02
kelly_fraction_cap_min: 0.01
kelly_fraction_cap_max: 0.10
kelly_fraction_cap_daily_step: 0.01
